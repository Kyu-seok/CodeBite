services:
  postgres:
    image: postgres:15
    container_name: codebite-postgres
    environment:
      POSTGRES_DB: codebite
      POSTGRES_USER: codebite
      POSTGRES_PASSWORD: codebite
    ports:
      - "5433:5432"
    volumes:
      - codebite-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: codebite-redis
    ports:
      - "6379:6379"
    volumes:
      - codebite-redis:/data

volumes:
  codebite-pgdata:
  codebite-redis:
