global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'codebite-backend'
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: ['backend']
        type: A
        port: 8080
        refresh_interval: 30s

  - job_name: 'codebite-worker'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['worker:8081']
