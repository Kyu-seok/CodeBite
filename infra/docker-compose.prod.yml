services:
  postgres:
    image: postgres:15
    container_name: codebite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codebite
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - codebite-pgdata:/var/lib/postgresql/data
    networks:
      - codebite

  backend:
    build: ../backend
    container_name: codebite-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codebite
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JUDGE0_URL: ${JUDGE0_URL:-http://judge0:2358}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OAUTH_REDIRECT_BASE_URI: ${OAUTH_REDIRECT_BASE_URI:-http://localhost:5173/auth/callback}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://code-bite.com}
    networks:
      - codebite

  frontend:
    build: ../frontend
    container_name: codebite-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - codebite

  judge0:
    image: judge0/judge0:1.13.1
    container_name: codebite-judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    depends_on:
      - judge0-db
      - judge0-redis
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    networks:
      - codebite

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: codebite-judge0-workers
    command: ["./scripts/workers"]
    restart: unless-stopped
    privileged: true
    depends_on:
      - judge0
      - judge0-db
      - judge0-redis
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    networks:
      - codebite

  judge0-db:
    image: postgres:13
    container_name: codebite-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    volumes:
      - judge0-pgdata:/var/lib/postgresql/data
    networks:
      - codebite

  judge0-redis:
    image: redis:7
    container_name: codebite-judge0-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - judge0-redis:/data
    networks:
      - codebite

volumes:
  codebite-pgdata:
  judge0-pgdata:
  judge0-redis:

networks:
  codebite:
