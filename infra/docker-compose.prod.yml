services:
  postgres:
    image: postgres:15
    container_name: codebite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codebite
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - codebite-pgdata:/var/lib/postgresql/data
    networks:
      - codebite

  redis:
    image: redis:7
    container_name: codebite-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "volatile-ttl"]
    volumes:
      - codebite-redis:/data
    networks:
      - codebite

  backend:
    build: ../backend
    restart: unless-stopped
    deploy:
      replicas: 3
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codebite
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JUDGE0_URL: ${JUDGE0_URL:-http://judge0:2358}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OAUTH_REDIRECT_BASE_URI: ${OAUTH_REDIRECT_BASE_URI:-http://localhost:5173/auth/callback}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://code-bite.com}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - codebite

  nginx:
    build: ../frontend
    container_name: codebite-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - codebite

  judge0:
    image: judge0/judge0:1.13.1
    container_name: codebite-judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    depends_on:
      - judge0-db
      - judge0-redis
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    networks:
      - codebite

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: codebite-judge0-workers
    command: ["./scripts/workers"]
    restart: unless-stopped
    privileged: true
    depends_on:
      - judge0
      - judge0-db
      - judge0-redis
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    networks:
      - codebite

  judge0-db:
    image: postgres:13
    container_name: codebite-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    volumes:
      - judge0-pgdata:/var/lib/postgresql/data
    networks:
      - codebite

  judge0-redis:
    image: redis:7
    container_name: codebite-judge0-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - judge0-redis:/data
    networks:
      - codebite

volumes:
  codebite-pgdata:
  codebite-redis:
  judge0-pgdata:
  judge0-redis:

networks:
  codebite:
