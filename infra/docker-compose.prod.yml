name: codebite

services:
  postgres:
    image: postgres:15
    container_name: codebite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codebite
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - codebite-pgdata:/var/lib/postgresql/data
    networks:
      - codebite

  redis:
    image: redis:7
    container_name: codebite-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "volatile-ttl"]
    volumes:
      - codebite-redis:/data
    networks:
      - codebite

  kafka:
    image: apache/kafka:3.7.0
    container_name: codebite-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: codebite-kafka-cluster-id-01
    networks:
      - codebite

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: codebite-backend
    restart: unless-stopped
    deploy:
      replicas: 3
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codebite
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JUDGE0_URL: ${JUDGE0_URL:-http://judge0:2358}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OAUTH_REDIRECT_BASE_URI: ${OAUTH_REDIRECT_BASE_URI:-http://localhost:5173/auth/callback}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://code-bite.com}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - codebite

  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    image: codebite-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codebite
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JUDGE0_URL: ${JUDGE0_URL:-http://judge0:2358}
    networks:
      - codebite

  nginx:
    build: ../frontend
    image: codebite-nginx
    container_name: codebite-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - codebite

  judge0:
    image: judge0/judge0:1.13.1
    container_name: codebite-judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    depends_on:
      - judge0-db
      - judge0-redis
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    networks:
      - codebite

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: codebite-judge0-workers
    command: ["./scripts/workers"]
    restart: unless-stopped
    privileged: true
    depends_on:
      - judge0
      - judge0-db
      - judge0-redis
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    networks:
      - codebite

  judge0-db:
    image: postgres:13
    container_name: codebite-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    volumes:
      - judge0-pgdata:/var/lib/postgresql/data
    networks:
      - codebite

  judge0-redis:
    image: redis:7
    container_name: codebite-judge0-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - judge0-redis:/data
    networks:
      - codebite

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: codebite-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - codebite-prometheus:/prometheus
    networks:
      - codebite

  grafana:
    image: grafana/grafana:10.4.0
    container_name: codebite-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/grafana}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - codebite-grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - codebite

  loki:
    image: grafana/loki:2.9.5
    container_name: codebite-loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - codebite-loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - codebite

  promtail:
    image: grafana/promtail:2.9.5
    container_name: codebite-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-prod.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - codebite

volumes:
  codebite-pgdata:
  codebite-redis:
  codebite-prometheus:
  codebite-grafana:
  codebite-loki:
  judge0-pgdata:
  judge0-redis:

networks:
  codebite:
