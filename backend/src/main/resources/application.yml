server:
  port: 8080

spring:
  # datasource wasn't there originally.
  datasource:
    url: jdbc:postgresql://localhost:5432/codebite
    username: codebite
    password: codebite
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256}
    expiration-ms: 86400000  # 24 hours
  judge0:
    url: ${JUDGE0_URL:http://localhost:2358}
    poll-interval-ms: ${JUDGE0_POLL_INTERVAL_MS:500}
    poll-timeout-ms: ${JUDGE0_POLL_TIMEOUT_MS:30000}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-base-uri: ${OAUTH_REDIRECT_BASE_URI:http://localhost:5173/auth/callback}
    state-expiration-ms: 300000
