server:
  port: 8080

spring:
  # datasource wasn't there originally.
  datasource:
    url: jdbc:postgresql://localhost:5432/codebite
    username: codebite
    password: codebite
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256}
    expiration-ms: 86400000  # 24 hours
  judge0:
    url: ${JUDGE0_URL:http://localhost:2358}
