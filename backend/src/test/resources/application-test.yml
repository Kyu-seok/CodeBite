spring:
  datasource:
    url: jdbc:h2:mem:codebite;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256-testing
    expiration-ms: 60000  # 1 minute
  judge0:
    url: http://localhost:2358
    poll-interval-ms: 100
    poll-timeout-ms: 5000
  oauth:
    google:
      client-id: test-google-client-id
      client-secret: test-google-client-secret
    github:
      client-id: test-github-client-id
      client-secret: test-github-client-secret
    redirect-base-uri: http://localhost:5173/auth/callback
    state-expiration-ms: 300000
